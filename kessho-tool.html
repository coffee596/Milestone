        // ===== 状態管理 =====
        const STORAGE_KEY = 'gbf_material_user_tabs_v5';

        function loadTabs() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch (e) { /* ignore */ }
            return [
                { id: 'tab_default', charName: 'シス', activeStage: 'Lv110', currentMaterials: {} }
            ];
        }

        function saveTabs(tabs) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
            } catch (e) { /* ignore */ }
        }

        let state = {
            userTabs: loadTabs(),
            activeTabId: null,
            showAllSummary: false
        };
        state.activeTabId = state.userTabs[0] ? state.userTabs[0].id : 'tab_default';

        function getCurrentTab() {
            return state.userTabs.find(t => t.id === state.activeTabId) || state.userTabs[0];
        }

        // 入手困難・特殊素材は赤強調
        const HIGHLIGHT_MATERIALS = ['マリシャスクランプ', '碧麗の証', '刻の流砂', '金剛晶'];

        // ===== イベントハンドラ =====
        function handleAddTab() {
            const nameList = Object.keys(RAW_MASTER_DATA);
            const newTab = {
                id: 'tab_' + Date.now(),
                charName: nameList[0],
                activeStage: Object.keys(RAW_MASTER_DATA[nameList[0]])[0],
                currentMaterials: {}
            };
            state.userTabs.push(newTab);
            state.activeTabId = newTab.id;
            persistAndRender();
        }

        function handleDeleteTab(id, name) {
            if (state.userTabs.length <= 1) {
                alert('最低1つの管理タブが必要です。');
                return;
            }
            if (window.confirm('「' + name + '」の目標を削除しますか？')) {
                state.userTabs = state.userTabs.filter(t => t.id !== id);
                if (state.activeTabId === id) {
                    state.activeTabId = state.userTabs[0].id;
                }
                persistAndRender();
            }
        }

        function handleSelectTab(id) {
            state.activeTabId = id;
            persistAndRender();
        }

        function handleCharChange(name) {
            const current = getCurrentTab();
            const defaultStage = Object.keys(RAW_MASTER_DATA[name])[0];
            current.charName = name;
            current.activeStage = defaultStage;
            current.currentMaterials = {};
            persistAndRender();
        }

        function handleStageChange(stage) {
            const current = getCurrentTab();
            current.activeStage = stage;
            persistAndRender();
        }

        function handleMaterialCountChange(matName, val) {
            const current = getCurrentTab();
            const num = Math.max(0, Number(val) || 0);
            current.currentMaterials[matName] = num;
            persistAndRender();
        }

        function handleToggleSummary() {
            state.showAllSummary = !state.showAllSummary;
            persistAndRender();
        }

        function persistAndRender() {
            saveTabs(state.userTabs);
            render();
        }

        // ===== ユーティリティ =====
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function computeShortageSummary() {
            const summary = {};
            state.userTabs.forEach(tab => {
                const reqs = (RAW_MASTER_DATA[tab.charName] && RAW_MASTER_DATA[tab.charName][tab.activeStage]) || [];
                reqs.forEach(m => {
                    const have = tab.currentMaterials[m.name] || 0;
                    const lack = Math.max(0, m.target - have);
                    if (lack > 0) {
                        summary[m.name] = (summary[m.name] || 0) + lack;
                    }
                });
            });
            return Object.entries(summary).sort((a, b) => b[1] - a[1]);
        }

        function numFmt(n) {
            return n.toLocaleString('ja-JP');
        }

        // ===== レンダリング =====
        function render() {
            const root = document.getElementById('root');
            const currentTab = getCurrentTab();
            const availableStages = Object.keys(RAW_MASTER_DATA[currentTab.charName]);
            const masterRequirements = RAW_MASTER_DATA[currentTab.charName][currentTab.activeStage] || [];
            const currentCategory = CHAR_CATEGORY[currentTab.charName];

            let totalScore = 0;
            masterRequirements.forEach(m => {
                const currentVal = currentTab.currentMaterials[m.name] || 0;
                totalScore += Math.min(m.target > 0 ? (currentVal / m.target) : 0, 1);
            });
            const percentage = masterRequirements.length > 0
                ? Math.round((totalScore / masterRequirements.length) * 100)
                : 0;

            // --- タブ ---
            let tabsHtml = state.userTabs.map(t => {
                const activeClass = t.id === state.activeTabId ? ' active' : '';
                return '<div class="tab' + activeClass + '" data-tab-id="' + escapeHtml(t.id) + '">' +
                    escapeHtml(t.charName) +
                    '<button class="delete-btn" data-delete-id="' + escapeHtml(t.id) + '" data-delete-name="' + escapeHtml(t.charName) + '">×</button>' +
                    '</div>';
            }).join('');

            // --- 全タブ不足合計 ---
            let summaryHtml = '';
            if (state.showAllSummary) {
                const shortage = computeShortageSummary();
                let bodyHtml;
                if (shortage.length === 0) {
                    bodyHtml = '<div class="all-summary-empty">全タブで素材が揃っています！</div>';
                } else {
                    const rows = shortage.map(([name, lack]) =>
                        '<tr><td>' + escapeHtml(name) + '</td><td class="needed-lack">' + numFmt(lack) + '</td></tr>'
                    ).join('');
                    bodyHtml = '<table><thead><tr><th>素材名</th><th>不足合計数</th></tr></thead><tbody>' + rows + '</tbody></table>';
                }
                summaryHtml = '<div class="progress-container" style="margin-bottom:20px;">' +
                    '<h3 class="all-summary-heading">📊 現在登録中の全' + state.userTabs.length + 'タブ：不足素材合計</h3>' +
                    bodyHtml +
                    '</div>';
            }

            // --- キャラ選択 select ---
            const kenjaOptions = Object.keys(RAW_MASTER_DATA)
                .filter(n => CHAR_CATEGORY[n] === '十賢者')
                .map(name => '<option value="' + escapeHtml(name) + '"' + (name === currentTab.charName ? ' selected' : '') + '>' + escapeHtml(name) + '</option>')
                .join('');
            const tenshuOptions = Object.keys(RAW_MASTER_DATA)
                .filter(n => CHAR_CATEGORY[n] === '十天衆')
                .map(name => '<option value="' + escapeHtml(name) + '"' + (name === currentTab.charName ? ' selected' : '') + '>' + escapeHtml(name) + '</option>')
                .join('');

            const badgeClass = currentCategory === '十賢者' ? 'kenja' : 'tenshu';
            const badgeHtml = currentCategory ? '<span class="category-badge ' + badgeClass + '">' + escapeHtml(currentCategory) + '</span>' : '';

            // --- ステージボタン ---
            const stageButtonsHtml = availableStages.map(stage => {
                const activeClass = stage === currentTab.activeStage ? ' active' : '';
                return '<button class="step-btn' + activeClass + '" data-stage="' + escapeHtml(stage) + '">' + escapeHtml(stage) + '</button>';
            }).join('');

            // --- 素材テーブル ---
            const rowsHtml = masterRequirements.map((m, idx) => {
                const currentCount = currentTab.currentMaterials[m.name] || 0;
                const neededCount = Math.max(0, m.target - currentCount);
                const isHighlighted = HIGHLIGHT_MATERIALS.indexOf(m.name) !== -1;
                const nameClass = isHighlighted ? ' class="highlight"' : '';
                const targetClass = isHighlighted ? ' class="highlight"' : '';
                const neededClass = neededCount > 0 ? 'needed-lack' : 'needed-done';
                const neededText = neededCount > 0 ? ('不足 ' + numFmt(neededCount)) : '完了';

                return '<tr>' +
                    '<td' + nameClass + '>' + escapeHtml(m.name) + '</td>' +
                    '<td><input type="number" min="0" value="' + currentCount + '" data-mat-name="' + escapeHtml(m.name) + '"></td>' +
                    '<td' + targetClass + '>/ ' + numFmt(m.target) + '</td>' +
                    '<td class="' + neededClass + '">' + neededText + '</td>' +
                    '</tr>';
            }).join('');

            const completeAlertHtml = percentage >= 100
                ? '<div class="alert-complete">🎉 必要素材がすべて揃いました！</div>'
                : '';

            root.innerHTML =
                '<div class="container">' +
                    '<h2 class="title">⚔️ 十天衆・十賢者 必要素材マネージャー</h2>' +
                    '<div class="subtitle">最終上限解放・超越（限界超越／賢者最終・4アビ）対応</div>' +

                    '<div class="tab-wrapper">' +
                        tabsHtml +
                        '<button class="add-btn" id="btn-add-tab">＋ 目標を追加</button>' +
                        '<button class="all-summary-btn" id="btn-toggle-summary">' +
                            (state.showAllSummary ? '✕ 合計を閉じる' : '📊 全タブの不足合計') +
                        '</button>' +
                    '</div>' +

                    summaryHtml +

                    '<div class="grid2">' +
                        '<div class="form-group">' +
                            '<label class="label">キャラクター選択' + badgeHtml + '</label>' +
                            '<select id="char-select">' +
                                '<optgroup label="十賢者">' + kenjaOptions + '</optgroup>' +
                                '<optgroup label="十天衆">' + tenshuOptions + '</optgroup>' +
                            '</select>' +
                        '</div>' +
                        '<div class="form-group">' +
                            '<label class="label">クイックステージ選択</label>' +
                            '<div style="color:#94a3b8;font-size:13px;margin-top:10px;">下のボタンで行きたい段階へ一発切り替えが可能です。</div>' +
                        '</div>' +
                    '</div>' +

                    '<div class="step-wrapper">' + stageButtonsHtml + '</div>' +

                    '<div class="progress-container">' +
                        '<h3 class="progress-title">【' + escapeHtml(currentTab.charName) + ' / ' + escapeHtml(currentTab.activeStage) + '】集め達成率:' +
                            '<span class="progress-pct">' + percentage + '%</span>' +
                        '</h3>' +
                        '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + percentage + '%;"></div></div>' +
                        completeAlertHtml +
                    '</div>' +

                    '<div style="margin-top:25px;">' +
                        '<h3 class="section-heading">📦 必要素材と所持数の入力</h3>' +
                        '<table>' +
                            '<thead><tr><th>素材名</th><th>現在所持数</th><th>目標必要数</th><th>あといくつ？</th></tr></thead>' +
                            '<tbody>' + rowsHtml + '</tbody>' +
                        '</table>' +
                    '</div>' +
                '</div>';

            attachEvents();
        }

        function attachEvents() {
            const root = document.getElementById('root');

            root.querySelectorAll('.tab').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) return;
                    handleSelectTab(el.getAttribute('data-tab-id'));
                });
            });

            root.querySelectorAll('.delete-btn').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleDeleteTab(el.getAttribute('data-delete-id'), el.getAttribute('data-delete-name'));
                });
            });

            const addBtn = document.getElementById('btn-add-tab');
            if (addBtn) addBtn.addEventListener('click', handleAddTab);

            const summaryBtn = document.getElementById('btn-toggle-summary');
            if (summaryBtn) summaryBtn.addEventListener('click', handleToggleSummary);

            const charSelect = document.getElementById('char-select');
            if (charSelect) charSelect.addEventListener('change', (e) => handleCharChange(e.target.value));

            root.querySelectorAll('.step-btn').forEach(el => {
                el.addEventListener('click', () => handleStageChange(el.getAttribute('data-stage')));
            });

            root.querySelectorAll('input[type="number"][data-mat-name]').forEach(el => {
                el.addEventListener('change', (e) => handleMaterialCountChange(el.getAttribute('data-mat-name'), e.target.value));
            });
        }

        // ===== 共通ハンバーガーメニュー（ドロワー）の初期化 =====
        (function () {
            const triggerBtn = document.getElementById('menu-trigger-btn');
            const overlay = document.getElementById('drawer-overlay');
            const panel = document.getElementById('drawer-panel');
            const closeBtn = document.getElementById('drawer-close-btn');
            function openDrawer() { overlay.classList.add('open'); panel.classList.add('open'); }
            function closeDrawer() { overlay.classList.remove('open'); panel.classList.remove('open'); }
            if (triggerBtn) triggerBtn.addEventListener('click', openDrawer);
            if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
            if (overlay) overlay.addEventListener('click', closeDrawer);
        })();

        render();
    </script>
</body>
</html>
